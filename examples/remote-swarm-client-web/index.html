<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burn — swarm client</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #0e0e10;
        }

        #burn {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="burn"></canvas>

    <script type="module">
        import init, { run } from "./pkg/remote_swarm_client_web.js";

        async function main() {
            await init();
            const join = decodeURIComponent(location.hash.replace(/^#/, ""));
            await run("burn", join);
        }

        main();
    </script>
</body>

</html>
