<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burn — browser compute peer</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #0e0e10;
        }

        #burn {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="burn"></canvas>

    <script type="module">
        import init, { run } from "./pkg/remote_compute_peer_web.js";

        // Keep the screen awake while this tab serves; the lock is auto-released when the tab is
        // hidden, so re-acquire on visibility or a tap. Best-effort: a no-op without the API.
        let wakeLock = null;
        async function keepAwake() {
            try {
                if (!wakeLock || wakeLock.released) {
                    wakeLock = await navigator.wakeLock?.request("screen");
                }
            } catch (_) {}
        }
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") keepAwake();
        });
        document.addEventListener("pointerdown", keepAwake);
        keepAwake();

        async function main() {
            await init();
            // A scanned QR / shared link lands here as `…/#burnswarm…`; hand the ticket to the peer
            // so it joins that swarm automatically. Empty means "ask in the UI".
            const join = decodeURIComponent(location.hash.replace(/^#/, ""));
            await run("burn", join);
        }

        main();
    </script>
</body>

</html>
