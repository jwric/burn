<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burn — remote peer dashboard</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #0e0e10;
        }

        #dash {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="dash"></canvas>

    <script type="module">
        import init, { run } from "./pkg/remote_dashboard_web.js";

        async function main() {
            await init();
            await run("dash", "/events");
        }

        main();
    </script>
</body>

</html>
